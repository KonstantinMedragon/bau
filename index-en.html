<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #111;
            color: #e9c5a5;
            line-height: 1.4;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            z-index: 0;
            overflow: hidden;
        }
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: left bottom;
            display: block;
        }

        .top-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 20vh;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 100%);
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px 28px 100px;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #e9c5a5;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .lang-custom {
            position: relative;
        }
        .lang-current {
            font-size: 0.9rem;
            font-weight: 500;
            color: #e9c5a5;
            cursor: pointer;
            background: transparent;
            padding: 6px 14px;
            border-radius: 30px;
            transition: 0.2s;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .lang-current:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .lang-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 70px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 50;
        }
        .lang-dropdown a {
            color: #e9c5a5;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            transition: 0.2s;
            display: block;
        }
        .lang-dropdown a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .lang-custom.open .lang-dropdown {
            display: flex;
        }
        .burger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: transparent;
            padding: 8px 10px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .burger:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .burger span {
            width: 22px;
            height: 2px;
            background: #e9c5a5;
            border-radius: 2px;
            transition: 0.3s;
        }
        .burger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .burger.active span:nth-child(2) {
            opacity: 0;
        }
        .burger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 33, 36, 0.92);
            backdrop-filter: blur(5px);
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 75%;
            max-width: 280px;
            height: 100vh;
            background: rgba(20, 22, 25, 0.98);
            backdrop-filter: blur(14px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 100px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-left: 1px solid rgba(233, 197, 165, 0.2);
        }
        .mobile-menu.open {
            right: 0;
        }
        .mobile-menu a {
            color: #e9c5a5;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 400;
            text-transform: lowercase;
            transition: 0.2s;
            letter-spacing: -0.2px;
        }
        .mobile-menu a:hover {
            opacity: 0.8;
            transform: translateX(5px);
        }

        .social-links-left {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 20;
            display: flex;
            gap: 12px;
            align-items: center;
            background: transparent;
        }
        .social-links-left a {
            color: #e9c5a5;
            font-size: 1.3rem;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .social-links-left a:hover {
            color: #f5d5aa;
            transform: translateY(-2px);
        }
        .social-divider {
            color: #e9c5a5;
            opacity: 0.5;
            font-size: 1rem;
            margin: 0 2px;
        }

        @media (max-width: 760px) {
            .content {
                padding: 20px 20px 80px;
            }
            .social-links-left {
                bottom: 20px;
                left: 20px;
                gap: 10px;
            }
            .social-links-left a {
                font-size: 1.2rem;
            }
            .logo {
                font-size: 1.3rem;
            }
            .top-gradient {
                height: 15vh;
            }
        }
    </style>
</head>
<body>
<div class="bg">
    <picture>
        <source media="(max-width: 760px)" srcset="images/finaleph.png">
        <img src="images/finalepс-en.png" alt="BAU co. background">
    </picture>
</div>
<div class="top-gradient"></div>

<div class="content">
    <div class="top-bar">
        <div class="logo">BAU co.</div>
        <div class="right-group">
            <div class="lang-custom" id="langSwitcher">
                <div class="lang-current" id="currentLang">EN</div>
                <div class="lang-dropdown">
                    <a href="#" data-lang="en">EN</a>
                    <a href="#" data-lang="ru">RU</a>
                </div>
            </div>
            <div class="burger" id="burgerBtn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="about-en.html">about</a>
        <a href="project-en.html">projects</a>
        <a href="service-en.html">services</a>
        <a href="invest-en.html">invest</a>
        <a href="contact-en.html">contact</a>
    </div>

    <div class="social-links-left">
        <a href="https://www.instagram.com/bauco.th" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <span class="social-divider">|</span>
        <a href="https://www.facebook.com/share/18qsa4jvfY/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <span class="social-divider">|</span>
        <a href="https://wa.me/66805289372" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <span class="social-divider">|</span>
        <a href="https://t.me/bauco" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
        <span class="social-divider">|</span>
        <a href="https://line.me/ti/p/1IP3YFzkKG" target="_blank" aria-label="LINE"><i class="fab fa-line"></i></a>
        <span class="social-divider">|</span>
        <a href="https://www.youtube.com/channel/UC6C5aRtqj-YU3GfiOVhaTJw" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
    </div>
</div>

<script>
    const burger = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');

    function closeMenu() {
        mobileMenu.classList.remove('open');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        burger.classList.remove('active');
    }
    function openMenu() {
        mobileMenu.classList.add('open');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        burger.classList.add('active');
    }
    burger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (mobileMenu.classList.contains('open')) closeMenu();
        else openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    
    document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            closeMenu();
        });
    });

    const langSwitcher = document.getElementById('langSwitcher');
    const currentLangSpan = document.getElementById('currentLang');
    const langOptions = document.querySelectorAll('.lang-dropdown a');
    
    function getRussianVersion() {
        const path = window.location.pathname;
        const filename = path.split('/').pop();
        const mapping = {
            'index-en.html': 'index-ru.html',
            'project-en.html': 'project-ru.html',
            'service-en.html': 'service-ru.html',
            'about-en.html': 'about-ru.html',
            'invest-en.html': 'invest-ru.html',
            'contact-en.html': 'contact-ru.html'
        };
        return mapping[filename] || 'index-ru.html';
    }
    
    langOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.preventDefault();
            const targetLang = opt.getAttribute('data-lang');
            const currentLangText = currentLangSpan.innerText.toLowerCase();
            if (targetLang === currentLangText) return;
            if (targetLang === 'ru') {
                window.location.href = getRussianVersion();
            }
            langSwitcher.classList.remove('open');
        });
    });
    
    currentLangSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        langSwitcher.classList.toggle('open');
    });
    
    document.addEventListener('click', (e) => {
        if (!langSwitcher.contains(e.target)) {
            langSwitcher.classList.remove('open');
        }
    });
</script>
</body>
</html>
