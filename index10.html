<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BAU co | Архитектура и инвестиции на Самуи</title>
    <!-- Playfair Display + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #111;
            color: rgba(255, 255, 255, 0.88);
            line-height: 1.4;
        }

        /* Фон через CSS — точное позиционирование левый нижний угол */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            background-image: url('images/main3.jpg');
            background-size: cover;
            background-position: left bottom;
            background-repeat: no-repeat;
        }

        /* Мобильная версия: другое фото, то же позиционирование */
        @media (max-width: 760px) {
            .bg {
                background-image: url('images/main3-1.jpg');
                background-position: left bottom;
            }
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px 28px 36px;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: rgba(255,255,255,0.92);
            text-decoration: none;
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        /* Переключатель языков */
        .lang-custom {
            position: relative;
        }
        .lang-current {
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            background: transparent;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .lang-current:hover {
            background: rgba(255,255,255,0.1);
        }
        .lang-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(30, 33, 36, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 0;
            margin-top: 6px;
            min-width: 70px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 50;
        }
        .lang-dropdown a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            transition: 0.2s;
            display: block;
        }
        .lang-dropdown a:hover {
            background: rgba(255,255,255,0.1);
        }
        .lang-custom.open .lang-dropdown {
            display: flex;
        }
        /* Бургер */
        .burger {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: transparent;
            padding: 6px 0;
        }
        .burger span {
            width: 26px;
            height: 2px;
            background: rgba(255,255,255,0.9);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Оверлей и меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 50, 55, 0.85);
            backdrop-filter: blur(5px);
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 75%;
            max-width: 280px;
            height: 100vh;
            background: rgba(30, 33, 36, 0.96);
            backdrop-filter: blur(14px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 100px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-left: 1px solid rgba(255,255,255,0.15);
        }
        .mobile-menu.open {
            right: 0;
        }
        .mobile-menu a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 400;
            text-transform: lowercase;
            transition: 0.2s;
            letter-spacing: -0.2px;
        }
        .mobile-menu a:hover {
            opacity: 0.7;
            transform: translateX(5px);
        }

        /* Соцсети — левый нижний угол, прижаты влево */
        .social-links-left {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 20;
            display: flex;
            gap: 12px;
            align-items: center;
            background: transparent;
        }
        .social-links-left a {
            color: rgba(255,255,255,0.8);
            font-size: 1.3rem;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .social-links-left a:hover {
            color: white;
            transform: translateY(-2px);
        }
        .social-divider {
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            margin: 0 2px;
        }

        /* Мобильная версия: подгоняем отступы */
        @media (max-width: 760px) {
            .content {
                padding: 20px 20px 30px;
            }
            .social-links-left {
                bottom: 20px;
                left: 20px;
                gap: 10px;
            }
            .social-links-left a {
                font-size: 1.2rem;
            }
            .logo {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="bg"></div>

<div class="content">
    <div class="top-bar">
        <div class="logo">BAU co</div>
        <div class="right-group">
            <div class="lang-custom" id="langSwitcher">
                <div class="lang-current" id="currentLang">EN</div>
                <div class="lang-dropdown">
                    <a href="#" data-lang="en">EN</a>
                    <a href="#" data-lang="ru">RU</a>
                </div>
            </div>
            <div class="burger" id="burgerBtn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="#">projects</a>
        <a href="#">services</a>
        <a href="#">about</a>
        <a href="#">invest</a>
        <a href="#">contact</a>
    </div>

    <div class="social-links-left">
        <a href="https://www.instagram.com/bauco.th" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <span class="social-divider">|</span>
        <a href="https://t.me/bauco" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
        <span class="social-divider">|</span>
        <a href="https://wa.me/66805289372" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <span class="social-divider">|</span>
        <a href="https://www.facebook.com/share/18qsa4jvfY/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>

<script>
    const burger = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');

    function closeMenu() {
        mobileMenu.classList.remove('open');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        burger.classList.remove('active');
    }
    function openMenu() {
        mobileMenu.classList.add('open');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        burger.classList.add('active');
    }
    burger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (mobileMenu.classList.contains('open')) closeMenu();
        else openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Navigate:', link.innerText);
            closeMenu();
        });
    });

    const langSwitcher = document.getElementById('langSwitcher');
    const currentLangSpan = document.getElementById('currentLang');
    const langOptions = document.querySelectorAll('.lang-dropdown a');
    
    function setLanguage(lang) {
        currentLangSpan.innerText = lang.toUpperCase();
        alert(`Демо-смена языка на ${lang.toUpperCase()}`);
    }
    langOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.preventDefault();
            const lang = opt.getAttribute('data-lang');
            if (lang === currentLangSpan.innerText.toLowerCase()) return;
            setLanguage(lang);
            langSwitcher.classList.remove('open');
        });
    });
    currentLangSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        langSwitcher.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
        if (!langSwitcher.contains(e.target)) {
            langSwitcher.classList.remove('open');
        }
    });
</script>
</body>
</html>
