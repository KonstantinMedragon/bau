<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>bau.in | Инжиниринг и консалтинг в Таиланде</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tilda Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 400;
            background: #000;
            overflow-x: hidden;
            height: 100vh;
        }

        /* Карусель на весь экран */
        .carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        .carousel-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            height: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        /* Лёгкое затемнение снизу для читаемости текста */
        .carousel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            pointer-events: none;
            z-index: 2;
        }

        /* Точки и стрелки (ручное управление) */
        .carousel-dots {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 15;
            pointer-events: none;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            transition: all 0.2s;
            pointer-events: auto;
            cursor: pointer;
        }
        .dot.active {
            width: 24px;
            border-radius: 4px;
            background-color: white;
        }
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(6px);
            width: 44px;
            height: 44px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 15;
            transition: 0.2s;
            border: none;
        }
        .carousel-arrow:hover {
            background: rgba(0,0,0,0.5);
        }
        .arrow-left { left: 16px; }
        .arrow-right { right: 16px; }
        @media (max-width: 760px) {
            .carousel-arrow { width: 36px; height: 36px; font-size: 18px; }
            .carousel-dots { bottom: 20px; }
        }

        /* Верхняя панель: логотип и бургер — без овалов, просто текст и иконка */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
            pointer-events: none;
        }
        .logo {
            pointer-events: auto;
            font-size: 1.9rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: white;
            text-decoration: none;
            background: transparent;
            backdrop-filter: none;
            padding: 0;
            border: none;
            font-family: inherit;
        }
        .logo span {
            font-weight: 300;
        }
        .burger {
            pointer-events: auto;
            width: 32px;
            height: 32px;
            background: transparent;
            backdrop-filter: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: none;
        }
        .burger span {
            width: 24px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: 0.3s;
        }
        .burger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .burger.active span:nth-child(2) {
            opacity: 0;
        }
        .burger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Меню: вместо чёрного экрана — прозрачный серый оверлей, пункты без фона */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 30, 35, 0.85); /* слегка серый полупрозрачный */
            backdrop-filter: blur(8px);
            z-index: 35;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Меню-контейнер: без фона, текст на оверлее */
        .side-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 75%;
            max-width: 300px;
            height: 100vh;
            background: transparent;
            z-index: 40;
            transition: right 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 100px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            backdrop-filter: none;
            pointer-events: auto;
        }
        .side-menu.open {
            right: 0;
        }
        .side-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 450;
            letter-spacing: -0.2px;
            transition: 0.2s;
            border-bottom: none;
            padding-bottom: 8px;
            display: inline-block;
            width: fit-content;
            opacity: 0.9;
        }
        .side-menu a:hover {
            opacity: 1;
            transform: translateX(5px);
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .side-menu a { font-size: 1.5rem; }
            .side-menu { padding: 90px 28px 30px; }
        }

        /* Соцсети — только иконки, без овала */
        .social-footer {
            position: fixed;
            bottom: 24px;
            left: 20px;
            z-index: 20;
            display: flex;
            gap: 20px;
            background: transparent;
            backdrop-filter: none;
            padding: 0;
            border: none;
            pointer-events: auto;
        }
        .social-footer a {
            color: white;
            font-size: 1.5rem;
            transition: 0.2s;
            text-decoration: none;
            opacity: 0.85;
        }
        .social-footer a:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        /* Языковой переключатель (овальный, только кнопка внизу справа) */
        .t-lang-switch {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 20;
            display: flex;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 6px;
            gap: 4px;
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            pointer-events: auto;
        }
        .t-lang-btn {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.2px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
        }
        .t-lang-btn.active {
            background: #ffffff !important;
            color: #000000 !important;
            pointer-events: none;
            cursor: default;
        }
        .t-lang-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.2) !important;
            transform: translateY(-1px);
        }
        @media (max-width: 760px) {
            .t-lang-switch { bottom: 20px; right: 16px; padding: 4px; gap: 2px; }
            .t-lang-btn { padding: 6px 16px; font-size: 12px; }
            .social-footer { bottom: 20px; left: 16px; gap: 16px; }
            .social-footer a { font-size: 1.4rem; }
        }

        /* Убираем лишние конфликты */
        a, button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<!-- КАРУСЕЛЬ (вручную) -->
<div class="carousel">
    <div class="carousel-inner" id="carouselInner">
        <div class="carousel-slide"><img src="images/pool.jpg" alt="Современный бассейн"></div>
        <div class="carousel-slide"><img src="images/rock.jpg" alt="Скальный ландшафт"></div>
    </div>
    <div class="carousel-arrow arrow-left" id="prevSlide"><i class="fas fa-chevron-left"></i></div>
    <div class="carousel-arrow arrow-right" id="nextSlide"><i class="fas fa-chevron-right"></i></div>
    <div class="carousel-dots" id="carouselDots">
        <div class="dot active"></div>
        <div class="dot"></div>
    </div>
</div>

<!-- Верхняя панель: логотип и бургер (без фона) -->
<div class="top-bar">
    <a href="#" class="logo">bau<span>.in</span></a>
    <div class="burger" id="burgerBtn">
        <span></span><span></span><span></span>
    </div>
</div>

<!-- Оверлей (серый, полупрозрачный) для меню -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Меню (пункты на сером оверлее, без чёрного фона) -->
<div class="side-menu" id="sideMenu">
    <a href="#">Главная</a>
    <a href="#">О нас</a>
    <a href="#">Услуги</a>
    <a href="#">Проекты</a>
    <a href="#">Инвестиции</a>
    <a href="#">Регламент</a>
    <a href="#">Контакты</a>
</div>

<!-- Соцсети (просто иконки, без овала) -->
<div class="social-footer">
    <a href="https://instagram.com" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="tel:+66812345678" aria-label="Phone"><i class="fas fa-phone-alt"></i></a>
    <a href="https://wa.me/66812345678" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
    <a href="mailto:info@bau.in" aria-label="Email"><i class="far fa-envelope"></i></a>
    <a href="https://t.me/bauin" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
</div>

<!-- Языковой переключатель (видимый, овальный) -->
<div class="t-lang-switch">
    <a class="t-lang-btn active" data-lang="ru">Ru</a>
    <a class="t-lang-btn" data-lang="en">En</a>
</div>

<script>
    // ---------- КАРУСЕЛЬ: ТОЛЬКО РУЧНОЕ УПРАВЛЕНИЕ (без автопрокрутки) ----------
    const slides = document.querySelectorAll('.carousel-slide');
    const inner = document.getElementById('carouselInner');
    let currentIndex = 0;

    function updateCarousel() {
        const width = inner.parentElement.clientWidth;
        inner.style.transform = `translateX(-${currentIndex * width}px)`;
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    function nextSlide() {
        if (currentIndex < slides.length - 1) currentIndex++;
        else currentIndex = 0;
        updateCarousel();
    }

    function prevSlide() {
        if (currentIndex > 0) currentIndex--;
        else currentIndex = slides.length - 1;
        updateCarousel();
    }

    function goToSlide(index) {
        if (index >= 0 && index < slides.length) {
            currentIndex = index;
            updateCarousel();
        }
    }

    document.getElementById('prevSlide').addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); });
    document.getElementById('nextSlide').addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); });

    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, i) => { dot.addEventListener('click', () => goToSlide(i)); });

    // Свайп для мобильных
    let touchStartX = 0;
    inner.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
    inner.addEventListener('touchend', (e) => {
        const diff = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(diff) > 50) diff > 0 ? prevSlide() : nextSlide();
    });
    // Десктоп-драг
    let mouseDown = false, startX = 0;
    inner.addEventListener('mousedown', (e) => { mouseDown = true; startX = e.clientX; e.preventDefault(); });
    window.addEventListener('mouseup', (e) => {
        if (mouseDown) {
            const diff = e.clientX - startX;
            if (Math.abs(diff) > 50) diff > 0 ? prevSlide() : nextSlide();
            mouseDown = false;
        }
    });
    window.addEventListener('resize', () => updateCarousel());
    updateCarousel();

    // ---------- БУРГЕР-МЕНЮ (серый оверлей, пункты без чёрного фона) ----------
    const burger = document.getElementById('burgerBtn');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');

    function closeMenu() {
        sideMenu.classList.remove('open');
        overlay.classList.remove('active');
        burger.classList.remove('active');
        document.body.style.overflow = '';
    }
    function openMenu() {
        sideMenu.classList.add('open');
        overlay.classList.add('active');
        burger.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    burger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sideMenu.classList.contains('open')) closeMenu();
        else openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    // Закрытие при клике на ссылки меню
    document.querySelectorAll('.side-menu a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Навигация:', link.innerText);
            closeMenu();
            if (link.innerText === 'Главная') window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });

    // ---------- ЯЗЫКОВОЙ ПЕРЕКЛЮЧАТЕЛЬ (видимый, активный язык — белый фон) ----------
    (function() {
        const langBtns = document.querySelectorAll('.t-lang-btn');
        let currentLang = 'ru'; // по умолчанию

        function setActiveLang(lang) {
            langBtns.forEach(btn => {
                const btnLang = btn.getAttribute('data-lang');
                if (btnLang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Проверка URL на /en
        if (window.location.pathname.startsWith('/en')) currentLang = 'en';
        setActiveLang(currentLang);

        langBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const targetLang = btn.getAttribute('data-lang');
                if (targetLang === currentLang) return;
                // Эмуляция / реальная смена языка (демо-режим)
                let newUrl = window.location.href;
                if (targetLang === 'en') {
                    if (!newUrl.includes('/en/') && !newUrl.endsWith('/en')) {
                        let origin = window.location.origin;
                        let path = window.location.pathname;
                        newUrl = origin + (path === '/' ? '/en/' : '/en' + path);
                    }
                } else {
                    newUrl = newUrl.replace(/\/en\//, '/').replace(/\/en$/, '/');
                }
                alert(`Переключение на ${targetLang.toUpperCase()}. В реальном проекте будет редирект на:\n${newUrl}`);
                setActiveLang(targetLang);
                currentLang = targetLang;
                // При желании раскомментировать: window.location.href = newUrl;
            });
        });
    })();
</script>
</body>
</html>
