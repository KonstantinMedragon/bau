<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BAU co. | Contact on Samui</title>
    <!-- Playfair Display + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c0c;
            color: #e9c5a5;
            line-height: 1.5;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .page-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: -2;
        }

        /* Контент занимает всё пространство, центрируем через flex */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 28px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 28px 28px 0 28px;
            position: relative;
            z-index: 30;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #e9c5a5;
            text-decoration: none;
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .lang-custom {
            position: relative;
        }
        .lang-current {
            font-size: 0.9rem;
            font-weight: 500;
            color: #e9c5a5;
            cursor: pointer;
            background: transparent;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .lang-current:hover {
            background: rgba(233, 197, 165, 0.15);
        }
        .lang-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(30, 33, 36, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 0;
            margin-top: 6px;
            min-width: 70px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(233, 197, 165, 0.3);
            z-index: 50;
        }
        .lang-dropdown a {
            color: #e9c5a5;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            transition: 0.2s;
            display: block;
        }
        .lang-dropdown a:hover {
            background: rgba(233, 197, 165, 0.15);
        }
        .lang-custom.open .lang-dropdown {
            display: flex;
        }
        .burger {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: transparent;
            padding: 6px 0;
        }
        .burger span {
            width: 26px;
            height: 2px;
            background: #e9c5a5;
            border-radius: 2px;
            transition: 0.3s;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 33, 36, 0.92);
            backdrop-filter: blur(5px);
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 75%;
            max-width: 280px;
            height: 100vh;
            background: rgba(20, 22, 25, 0.98);
            backdrop-filter: blur(14px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 100px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-left: 1px solid rgba(233, 197, 165, 0.2);
        }
        .mobile-menu.open {
            right: 0;
        }
        .mobile-menu a {
            color: #e9c5a5;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 400;
            transition: 0.2s;
            letter-spacing: -0.2px;
        }
        .mobile-menu a:hover {
            opacity: 0.8;
            transform: translateX(5px);
        }

        /* Контент контактов — центрирован */
        .contacts-centered {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .hero-contacts {
            margin-bottom: 40px;
        }
        .hero-contacts h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 12px;
            color: #e9c5a5;
        }
        .hero-contacts p {
            font-size: 1rem;
            color: rgba(233, 197, 165, 0.85);
        }

        /* Плашка с соцсетями */
        .social-footer {
            background: rgba(20, 22, 25, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(233, 197, 165, 0.25);
            border-radius: 28px;
            padding: 28px 24px;
            text-align: center;
        }
        .social-links-center {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .social-links-center a {
            color: #e9c5a5;
            font-size: 1.3rem;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .social-links-center a:hover {
            color: #f5d5aa;
            transform: translateY(-2px);
        }
        .social-divider {
            color: #e9c5a5;
            opacity: 0.4;
            font-size: 0.9rem;
        }
        .email-icon {
            cursor: pointer;
        }

        .scroll-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: rgba(233, 197, 165, 0.2);
            backdrop-filter: blur(4px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
            border: 1px solid rgba(233, 197, 165, 0.4);
        }
        .scroll-top:hover {
            background: rgba(233, 197, 165, 0.4);
            transform: translateY(-2px);
        }
        .scroll-top i {
            color: #e9c5a5;
            font-size: 1.2rem;
        }

        @media (max-width: 760px) {
            .top-bar { padding: 20px 20px 0 20px; }
            .hero-contacts h1 { font-size: 1.8rem; }
            .main-content { padding: 20px 20px; }
            .social-footer { padding: 20px 16px; }
            .social-links-center { gap: 8px; }
            .social-links-center a { font-size: 1.1rem; }
            .logo { font-size: 1.3rem; }
            .scroll-top { bottom: 20px; right: 20px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div class="page-bg"></div>

<div class="top-bar">
    <div class="logo">BAU co.</div>
    <div class="right-group">
        <div class="lang-custom" id="langSwitcher">
            <div class="lang-current" id="currentLang">EN</div>
            <div class="lang-dropdown">
                <a href="#" data-lang="en">EN</a>
                <a href="#" data-lang="ru">RU</a>
            </div>
        </div>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
    <a href="index-en.html">home</a>
    <a href="project-en.html">projects</a>
    <a href="service-en.html">services</a>
    <a href="invest-en.html">invest</a>
    <a href="contact-en.html">contact</a>
</div>

<div class="main-content">
    <div class="contacts-centered">
        <div class="hero-contacts">
            <h1>Contact</h1>
            <p>Reach out to us via social media, messengers or email</p>
        </div>

        <div class="social-footer">
            <div class="social-links-center">
                <a href="https://www.instagram.com/bauco.th" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <span class="social-divider">|</span>
                <a href="https://www.facebook.com/share/18qsa4jvfY/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                <span class="social-divider">|</span>
                <a href="https://wa.me/66805289372" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <span class="social-divider">|</span>
                <a href="https://t.me/bauco" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
                <span class="social-divider">|</span>
                <a href="https://line.me/ti/p/1IP3YFzkKG" target="_blank" aria-label="LINE"><i class="fab fa-line"></i></a>
                <span class="social-divider">|</span>
                <a href="#" id="emailIcon" class="email-icon" aria-label="Email">
                    <i class="far fa-envelope"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <i class="fas fa-arrow-up"></i>
</div>

<script>
    const burger = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');

    function closeMenu() {
        mobileMenu.classList.remove('open');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        burger.classList.remove('active');
    }
    function openMenu() {
        mobileMenu.classList.add('open');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        burger.classList.add('active');
    }
    burger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (mobileMenu.classList.contains('open')) closeMenu();
        else openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    
    document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            closeMenu();
        });
    });

    const langSwitcher = document.getElementById('langSwitcher');
    const currentLangSpan = document.getElementById('currentLang');
    const langOptions = document.querySelectorAll('.lang-dropdown a');
    
    langOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.preventDefault();
            const targetLang = opt.getAttribute('data-lang');
            const currentLangText = currentLangSpan.innerText.toLowerCase();
            
            if (targetLang === currentLangText) return;
            
            if (targetLang === 'ru') {
                window.location.href = 'contact-ru.html';
            }
            langSwitcher.classList.remove('open');
        });
    });
    
    currentLangSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        langSwitcher.classList.toggle('open');
    });
    
    document.addEventListener('click', (e) => {
        if (!langSwitcher.contains(e.target)) {
            langSwitcher.classList.remove('open');
        }
    });

    const emailIcon = document.getElementById('emailIcon');
    if (emailIcon) {
        emailIcon.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'mailto:bauinthai@gmail.com';
            setTimeout(() => {
                alert('Please contact us via email: bauinthai@gmail.com');
            }, 200);
        });
    }
</script>
</body>
</html>
