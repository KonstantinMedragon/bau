<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BAU co | Архитектура и инвестиции на Самуи</title>
    <!-- Только Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a120b;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }

        /* Фоновое изображение с тёплым затемнением */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 20, 12, 0.55);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px 28px 36px;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }
        /* Правая группа: сначала бургер, потом переключатель языков */
        .right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        /* Бургер-иконка */
        .burger {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: transparent;
            padding: 6px 0;
        }
        .burger span {
            width: 24px;
            height: 2px;
            background: rgba(255,255,255,0.9);
            border-radius: 2px;
            transition: 0.3s;
        }
        /* Переключатель языков текстом с вертикальной чертой */
        .lang-switch {
            display: flex;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
        }
        .lang-option {
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .lang-option:hover {
            opacity: 0.7;
        }
        .lang-option.active {
            font-weight: 600;
            color: white;
            pointer-events: none;
        }
        .lang-sep {
            color: rgba(255,255,255,0.5);
        }

        /* Мобильное меню (боковое) */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 75%;
            max-width: 280px;
            height: 100vh;
            background: rgba(20, 15, 12, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 100px 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-left: 1px solid rgba(255,255,255,0.15);
        }
        .mobile-menu.open {
            right: 0;
        }
        .mobile-menu a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 400;
            transition: 0.2s;
        }
        .mobile-menu a:hover {
            opacity: 0.7;
            transform: translateX(5px);
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Герой-текст — три строки, заголовок уменьшен */
        .hero-text {
            text-align: left;
            max-width: 700px;
            margin-top: 25vh;
            margin-bottom: auto;
        }
        .hero-line1 {
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.2em;
            letter-spacing: -0.01em;
            color: rgba(255,255,255,0.9);
        }
        .hero-line2 {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 1.3;
            margin-top: 0.5em;
            color: rgba(255,255,255,0.85);
        }
        .hero-line3 {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 1.3;
            color: rgba(255,255,255,0.85);
        }

        /* Социальные кнопки внизу (центр) — только Telegram, WhatsApp, Facebook */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 50px;
            margin-bottom: 20px;
        }
        .social-links a {
            color: rgba(255,255,255,0.8);
            font-size: 1.6rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .social-links a:hover {
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 760px) {
            .content {
                padding: 20px 20px 30px;
            }
            .hero-line1 {
                font-size: 1.9rem;
            }
            .hero-line2, .hero-line3 {
                font-size: 1.2rem;
            }
            .hero-text {
                margin-top: 20vh;
            }
            .social-links {
                gap: 28px;
            }
            .logo {
                font-size: 1.3rem;
            }
            .right-group {
                gap: 14px;
            }
            .lang-switch {
                font-size: 0.8rem;
            }
        }
        @media (min-width: 1400px) {
            .hero-line1 {
                font-size: 3.2rem;
            }
            .hero-line2, .hero-line3 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="bg">
    <img src="images/main1.jpg" alt="Tropical architecture background">
</div>
<div class="content">
    <!-- Верхняя панель: лого слева, справа бургер + переключатель языков (именно в таком порядке) -->
    <div class="top-bar">
        <div class="logo">BAU co</div>
        <div class="right-group">
            <div class="burger" id="burgerBtn">
                <span></span><span></span><span></span>
            </div>
            <div class="lang-switch" id="langSwitch">
                <span class="lang-option" data-lang="en">EN</span>
                <span class="lang-sep">|</span>
                <span class="lang-option" data-lang="ru">RU</span>
            </div>
        </div>
    </div>

    <!-- Бургер-меню -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="#">PROJECTS</a>
        <a href="#">SERVICES</a>
        <a href="#">ABOUT</a>
        <a href="#">INVEST</a>
        <a href="#">CONTACT</a>
    </div>

    <!-- Герой-текст: три строки -->
    <div class="hero-text">
        <div class="hero-line1">Architecture That Blends<br>Nature & Living</div>
        <div class="hero-line2">Exclusive Tropical Villas</div>
        <div class="hero-line3">For Living & Investment</div>
    </div>

    <!-- Три кнопки контактов: Telegram, WhatsApp, Facebook (телефон удалён) -->
    <div class="social-links">
        <a href="https://t.me/bauco" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://wa.me/66805289372" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/share/18qsa4jvfY/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>

<script>
    // Бургер-меню
    const burger = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');

    function closeMenu() {
        mobileMenu.classList.remove('open');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        burger.classList.remove('active');
    }
    function openMenu() {
        mobileMenu.classList.add('open');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        burger.classList.add('active');
    }
    burger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (mobileMenu.classList.contains('open')) closeMenu();
        else openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Navigate:', link.innerText);
            closeMenu();
        });
    });

    // Переключатель языков
    const langOptions = document.querySelectorAll('.lang-option');
    let currentLang = 'en';
    function setActiveLang(lang) {
        langOptions.forEach(opt => {
            const langVal = opt.getAttribute('data-lang');
            if (langVal === lang) opt.classList.add('active');
            else opt.classList.remove('active');
        });
    }
    setActiveLang('en');
    langOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.preventDefault();
            const targetLang = opt.getAttribute('data-lang');
            if (targetLang === currentLang) return;
            alert(`Демо-переключение на ${targetLang.toUpperCase()}`);
            setActiveLang(targetLang);
            currentLang = targetLang;
        });
    });
</script>
</body>
</html>
